{% extends "base.html" %}
{% block content %}
  <h1>{{ title }}</h1>

  <form method="post">
    {{ form.hidden_tag() }}
    <p>
      {{ form.name.label }}<br>
      {{ form.name(size=40) }}
      {% for error in form.name.errors %}
        <span style="color: red;">{{ error }}</span>
      {% endfor %}
    </p>
    <p>{{ form.submit() }}</p>
  </form>

  <p><a href="{{ url_for('main.index') }}">Zurück</a></p>
{% endblock %}
